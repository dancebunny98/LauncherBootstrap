name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            fileName: "EOCLauncherLinux"
            assetName: "linux_executable"
          - os: windows-latest
            fileName: "EOCLauncher.exe"
            assetName: "windows_executable.exe"
          - os: macos-latest
            fileName: "EOCLauncherMacos"
            assetName: "macos_executable"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Verify icon exists (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (-not (Test-Path "assets/icon.ico")) {
            Write-Error "❌ Icon file assets/icon.ico not found!"
            exit 1
          }
          Write-Output "✅ Icon found at assets/icon.ico"

      - name: Verify icon exists (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          if [ ! -f assets/icon.ico ]; then
            echo "❌ Icon file assets/icon.ico not found!"
            exit 1
          fi
          echo "✅ Icon found at assets/icon.ico"

      - name: Build executable
        run: dart compile exe ./bin/launcher_bootstrap.dart -o ${{ matrix.fileName }}

      - name: Add icon to Windows executable
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Output "Adding icon to Windows executable..."
          # Скачиваем rcedit
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile "rcedit-x64.exe"
          # Добавляем иконку к EXE
          .\rcedit-x64.exe ${{ matrix.fileName }} --set-icon assets/icon.ico
          Write-Output "✅ Icon added to Windows executable"

      - name: Create macOS app bundle with icon
        if: matrix.os == 'macos-latest'
        run: |
          echo "Creating macOS app bundle..."
          # Создаем структуру .app bundle
          mkdir -p Starter.app/Contents/{MacOS,Resources}
          
          # Копируем исполняемый файл
          cp ${{ matrix.fileName }} Starter.app/Contents/MacOS/starter
          chmod +x Starter.app/Contents/MacOS/starter
          
          # Создаем Info.plist
          cat > Starter.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>starter</string>
              <key>CFBundleIdentifier</key>
              <string>com.eoc.launcher</string>
              <key>CFBundleName</key>
              <string>EOC Launcher</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.13</string>
          </dict>
          </plist>
          EOF
          
          # Конвертируем .ico в .icns для macOS (если доступно)
          if command -v iconutil &> /dev/null; then
            # Создаем временную папку для иконок
            mkdir -p icon.iconset
            # Конвертируем .ico в PNG (используем sips)
            sips -s format png assets/icon.ico --out icon.iconset/icon_512x512.png 2>/dev/null || true
            # Создаем .icns если конвертация удалась
            if [ -f icon.iconset/icon_512x512.png ]; then
              iconutil -c icns icon.iconset -o Starter.app/Contents/Resources/icon.icns
              echo "✅ macOS .icns icon created"
            else
              echo "⚠️ Could not convert .ico to .icns, using default icon"
            fi
          else
            echo "⚠️ iconutil not available, skipping .icns creation"
          fi
          
          # Архивируем .app bundle
          zip -r ${{ matrix.fileName }}_with_icon.zip Starter.app
          mv ${{ matrix.fileName }}_with_icon.zip ${{ matrix.fileName }}
          echo "✅ macOS app bundle created"

      - name: Create Linux desktop entry with icon
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Creating Linux package with icon..."
          # Создаем временную структуру для пакета
          mkdir -p eoc-launcher/{usr/bin,usr/share/applications,usr/share/icons/hicolor/256x256/apps}
          
          # Копируем исполняемый файл
          cp ${{ matrix.fileName }} eoc-launcher/usr/bin/eoc-launcher
          chmod +x eoc-launcher/usr/bin/eoc-launcher
          
          # Конвертируем .ico в .png для Linux (если установлен ImageMagick)
          if command -v convert &> /dev/null; then
            convert assets/icon.ico eoc-launcher/usr/share/icons/hicolor/256x256/apps/eoc-launcher.png
            echo "✅ Converted .ico to .png for Linux"
          else
            # Просто копируем .ico если convert недоступен
            cp assets/icon.ico eoc-launcher/usr/share/icons/hicolor/256x256/apps/eoc-launcher.ico
            echo "⚠️ ImageMagick not available, using .ico directly"
          fi
          
          # Создаем .desktop файл
          cat > eoc-launcher/usr/share/applications/eoc-launcher.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=EOC Launcher
          Comment=EOC Game Launcher
          Exec=/usr/bin/eoc-launcher
          Icon=eoc-launcher
          Categories=Game;
          Terminal=false
          StartupNotify=false
          EOF
          
          # Архивируем пакет
          tar -czf ${{ matrix.fileName }}_with_icon.tar.gz eoc-launcher/
          mv ${{ matrix.fileName }}_with_icon.tar.gz ${{ matrix.fileName }}
          echo "✅ Linux package with icon created"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            ${{ matrix.fileName }}
          name: Release

      - name: Cleanup Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Output "Cleaning up Windows temporary files..."
          Remove-Item -Force -ErrorAction SilentlyContinue rcedit-x64.exe
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue Starter.app
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue icon.iconset
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue eoc-launcher

      - name: Cleanup Unix
        if: matrix.os != 'windows-latest'
        run: |
          echo "Cleaning up Unix temporary files..."
          rm -f rcedit-x64.exe
          rm -rf Starter.app icon.iconset eoc-launcher
